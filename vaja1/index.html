<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accelerometer Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; color: #222; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 20px; }

    .card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }

    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      color: #888;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover { border-color: #185FA5; color: #185FA5; }
    .upload-area input { display: none; }

    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .metric { background: #f9f9f9; border-radius: 8px; padding: 14px; text-align: center; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 500; }
    .x-val { color: #185FA5; }
    .y-val { color: #0F6E56; }
    .z-val { color: #993C1D; }

    .chart-container { position: relative; height: 280px; }
    .hidden { display: none; }
    .file-name { font-size: 13px; color: #555; margin-top: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px; background: #f0f0f0; color: #555; font-weight: 500; }
    td { padding: 8px; border-top: 1px solid #eee; color: #333; }
    .table-wrapper { max-height: 200px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee; }
  </style>
</head>
<body>

  <h1>Accelerometer Viewer</h1>

  <div class="upload-area" onclick="document.getElementById('csv-input').click()">
    <input type="file" id="csv-input" accept=".csv" onchange="handleFile(event)" />
    <p style="font-size: 16px; margin-bottom: 6px;">Click to upload phyphox CSV</p>
    <p style="font-size: 13px;">Export from phyphox → three dots → Export Data → CSV</p>
    <p class="file-name" id="file-name"></p>
  </div>

  <div id="results" class="hidden">

    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">X min / max (m/s²)</div>
        <div class="metric-value x-val" id="stat-x">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Y min / max (m/s²)</div>
        <div class="metric-value y-val" id="stat-y">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Z min / max (m/s²)</div>
        <div class="metric-value z-val" id="stat-z">—</div>
      </div>
    </div>

    <div class="card">
      <p style="font-size: 13px; color: #888; margin-bottom: 12px;">X / Y / Z over time</p>
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="card">
      <p style="font-size: 13px; color: #888; margin-bottom: 12px;">Raw data (first 100 rows)</p>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Time (s)</th>
              <th style="color: #185FA5;">X (m/s²)</th>
              <th style="color: #0F6E56;">Y (m/s²)</th>
              <th style="color: #993C1D;">Z (m/s²)</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let chart = null;

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      document.getElementById('file-name').textContent = file.name;
      const reader = new FileReader();
      reader.onload = function(e) { parseAndDisplay(e.target.result); };
      reader.readAsText(file);
    }

    function parseAndDisplay(text) {
      const lines = text.trim().split('\n');

      let headerIndex = 0;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].toLowerCase().includes('time') || lines[i].toLowerCase().includes('x')) {
          headerIndex = i;
          break;
        }
      }

      const dataLines = lines.slice(headerIndex + 1);
      const times = [], xs = [], ys = [], zs = [];

      dataLines.forEach(line => {
        const cols = line.split(',');
        if (cols.length < 4) return;
        const t = parseFloat(cols[0]);
        const x = parseFloat(cols[1]);
        const y = parseFloat(cols[2]);
        const z = parseFloat(cols[3]);
        if (isNaN(t) || isNaN(x) || isNaN(y) || isNaN(z)) return;
        times.push(t.toFixed(2));
        xs.push(x);
        ys.push(y);
        zs.push(z);
      });

      if (times.length === 0) {
        alert('Could not parse CSV. Make sure it is exported from phyphox Acceleration (without g).');
        return;
      }

      const minMax = arr => [Math.min(...arr).toFixed(2), Math.max(...arr).toFixed(2)];
      const [xMin, xMax] = minMax(xs);
      const [yMin, yMax] = minMax(ys);
      const [zMin, zMax] = minMax(zs);
      document.getElementById('stat-x').textContent = `${xMin} / ${xMax}`;
      document.getElementById('stat-y').textContent = `${yMin} / ${yMax}`;
      document.getElementById('stat-z').textContent = `${zMin} / ${zMax}`;

      if (chart) chart.destroy();
      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: times,
          datasets: [
            { label: 'X', data: xs, borderColor: '#185FA5', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
            { label: 'Y', data: ys, borderColor: '#0F6E56', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
            { label: 'Z', data: zs, borderColor: '#993C1D', borderWidth: 1.5, pointRadius: 0, tension: 0.2 }
          ]
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { font: { size: 12 }, boxWidth: 12 } } },
          scales: {
            x: {
              ticks: { font: { size: 10 }, maxTicksLimit: 10 },
              title: { display: true, text: 'Time (s)', font: { size: 12 } }
            },
            y: {
              ticks: { font: { size: 11 } },
              title: { display: true, text: 'm/s²', font: { size: 12 } }
            }
          }
        }
      });

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      const limit = Math.min(times.length, 100);
      for (let i = 0; i < limit; i++) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${times[i]}</td>
          <td style="color: #185FA5;">${xs[i].toFixed(4)}</td>
          <td style="color: #0F6E56;">${ys[i].toFixed(4)}</td>
          <td style="color: #993C1D;">${zs[i].toFixed(4)}</td>
        `;
        tbody.appendChild(row);
      }

      document.getElementById('results').classList.remove('hidden');
    }
  </script>

</body>
</html>
